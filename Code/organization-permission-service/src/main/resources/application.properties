spring.application.name=organization-permission-service
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/db_projectmanage?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Hong_Kong&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123123

spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8

spring.jackson.time-zone=Asia/Hong_Kong
