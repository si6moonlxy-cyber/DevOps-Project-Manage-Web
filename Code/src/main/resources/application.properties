spring.application.name=delivery-metrics-platform
server.port=8090

spring.datasource.url=jdbc:h2:mem:delivery_metrics;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=false

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

spring.jackson.time-zone=Asia/Hong_Kong
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.session.timeout=8h
